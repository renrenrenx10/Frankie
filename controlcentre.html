<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ControlCentre — NuCCoL</title>
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ================================================================
   CSS VARIABLES & RESET  (Frankie/SCC design system)
================================================================ */
:root {
  --brand:#10243a; --accent:#26a9d8; --accent2:#1a86b0;
  --ok:#087f5b; --warn:#9a5a00; --red:#c0392b; --red-bg:#fff0ee;
  --line:#d8e2ec; --panel:#fff; --wash:#f7fbff;
  --muted:#65758a; --ink:#142132;

  /* legacy variable names kept as aliases onto the palette above, so
     every existing var(--xxx) reference throughout the app (including
     inline styles built in JS template strings) resolves to the new
     Frankie/SCC colours without having to touch each call site. */
  --navy:    var(--brand);
  --blue:    var(--accent);
  --blue2:   var(--accent2);
  --purple:  var(--accent2);
  --white:   #FFFFFF;
  --bg:      #edf3f8;
  --text:    var(--ink);
  --border:  var(--line);
  --row-alt: var(--wash);
  --green:   var(--ok);
  --red:     var(--red);
  --orange:  var(--warn);
  --indigo:  var(--accent2);
  --violet:  var(--accent2);
  --teal:    var(--accent);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Barlow', Arial, sans-serif;
  background: #edf3f8;
  color: #142132;
  font-size: 14px;
}
button { font-family: inherit; cursor: pointer; }
input, select, textarea { font-family: inherit; }

/* ================================================================
   LAYOUT
================================================================ */
#app { min-height: 100vh; display: flex; flex-direction: column; }

/* ---- HEADER ---- */
.hdr {
  background: var(--brand);
  border-bottom: 3px solid var(--accent);
  padding: 0 28px;
  height: 86px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.hdr-left { display: flex; align-items: center; gap: 16px; }
.hdr-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 26px;
  font-weight: 800;
  color: #fff;
  letter-spacing: .04em;
  text-transform: uppercase;
}
.hdr-sub {
  font-family: 'Barlow', sans-serif;
  font-size: 12px;
  color: rgba(255,255,255,0.72);
  margin-top: 3px;
}
.hdr-right { display: flex; align-items: center; gap: 8px; }
.user-chip {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px;
  letter-spacing: .03em;
  color: rgba(255,255,255,0.78);
}

/* ---- BACK BUTTON ---- */
.back-btn {
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.35);
  color: #fff;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px;
  padding: 6px 14px;
  font-weight: 800;
  letter-spacing: .06em;
  text-transform: uppercase;
  border-radius: 6px;
  transition: background 0.15s;
}
.back-btn:hover { background: rgba(255,255,255,0.24); }

/* ---- MAIN CONTENT ---- */
.main {
  flex: 1;
  padding: 24px 28px 40px;
  overflow-x: auto;
}

/* ================================================================
   HOME SCREEN
================================================================ */
.home-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 24px;
  margin-top: 32px;
}
.home-card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 10px;
  width: auto;
  padding: 36px 24px 28px;
  text-align: center;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
}
.home-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(16,36,58,0.14);
  border-color: var(--accent);
}
.home-card-icon {
  font-size: 44px;
  color: var(--accent2);
  margin-bottom: 14px;
  line-height: 1;
}
.home-card h2 {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 18px;
  font-weight: 800;
  color: var(--ink);
  letter-spacing: .04em;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.home-card p { font-size: 12px; color: var(--muted); line-height: 1.55; }

.home-stats {
  display: flex;
  gap: 24px;
  margin-top: 32px;
  flex-wrap: wrap;
}

/* ================================================================
   KPI CARDS
================================================================ */
.kpi-row {
  display: flex;
  gap: 14px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.kpi-card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 14px 18px;
  flex: 1;
  min-width: 140px;
  cursor: pointer;
  transition: border-color 0.15s;
}
.kpi-card:hover { border-color: var(--accent); }
.kpi-card.active { border-color: var(--accent); border-width: 2px; }
.kpi-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .08em;
  font-weight: 700;
  margin-bottom: 8px;
}
.kpi-val {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 24px;
  font-weight: 800;
  line-height: 1;
}
.kpi-card-static {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 14px 18px;
  flex: 1;
  min-width: 140px;
}

/* ================================================================
   DATA TABLE
================================================================ */
.tbl-wrap {
  border: 1px solid var(--line);
  border-radius: 8px;
  overflow: hidden;
  overflow-x: auto;
  background: var(--panel);
}
.data-table {
  width: 100%;
  border-collapse: collapse;
}
.data-table th {
  background: var(--brand);
  color: #fff;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: .05em;
  text-transform: uppercase;
  padding: 9px 12px;
  border-right: 1px solid rgba(255,255,255,0.12);
  white-space: nowrap;
}
.data-table th.hdr-blue { background: var(--accent2); }
.data-table td {
  padding: 7px 12px;
  border-bottom: 1px solid var(--line);
  font-size: 12px;
  background: var(--panel);
}
.data-table tbody tr:nth-child(even) td { background: var(--wash); }
.data-table tbody tr.clickable { cursor: pointer; }
.data-table tbody tr.clickable:hover td { background: #e4f2fa; }
.data-table tfoot td {
  background: var(--wash);
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 12px;
  border-top: 2px solid var(--brand);
}
.ta-right { text-align: right; }
.ta-center { text-align: center; }
.nowrap { white-space: nowrap; }

/* ================================================================
   SECTION HEADING
================================================================ */
.section-hd {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--brand);
  letter-spacing: .08em;
  text-transform: uppercase;
  margin: 20px 0 6px;
  border-left: 3px solid var(--accent);
  padding-left: 8px;
}

/* ================================================================
   FILTER BAR
================================================================ */
.filter-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.filter-bar label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .04em;
}
.filter-bar select, .filter-bar input {
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 5px 10px;
  font-size: 12px;
  background: var(--panel);
  color: var(--ink);
  outline: none;
}
.filter-bar select:focus, .filter-bar input:focus { border-color: var(--accent); }

/* ================================================================
   INLINE SELECT / STATUS
================================================================ */
.inline-select {
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 3px 6px;
  font-size: 12px;
  background: var(--panel);
  color: var(--ink);
  outline: none;
  cursor: pointer;
  width: 100%;
}
.inline-select:focus { border-color: var(--accent); }

/* stage badges — RAG-mapped pills, one per lifecycle stage */
.stage-engagement, .stage-build, .stage-proposal, .stage-deliver,
.stage-complete, .stage-lost {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 999px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .04em;
  text-transform: uppercase;
  white-space: nowrap;
}
.stage-engagement { background: rgba(154,90,0,0.12);   color: var(--warn); }
.stage-build      { background: rgba(38,169,216,0.14); color: var(--accent2); }
.stage-proposal   { background: rgba(154,90,0,0.12);   color: var(--warn); }
.stage-deliver    { background: rgba(8,127,91,0.12);   color: var(--ok); }
.stage-complete   { background: rgba(26,134,176,0.12); color: var(--accent2); }
.stage-lost       { background: var(--red-bg);         color: var(--red); }

.pri-pill {
  display: inline-block;
  min-width: 18px;
  text-align: center;
  padding: 1px 7px;
  border-radius: 999px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  font-weight: 800;
}
.pri-1 { background: var(--red-bg); color: var(--red); }
.pri-2 { background: rgba(154,90,0,0.12); color: var(--warn); }
.pri-3 { background: rgba(8,127,91,0.12); color: var(--ok); }

/* ================================================================
   PROJECT DETAIL
================================================================ */
.detail-kpi-row {
  display: flex;
  gap: 12px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.detail-kpi {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 10px 14px;
  min-width: 160px;
  flex: 1;
}
.detail-kpi-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .06em;
  margin-bottom: 6px;
}
.detail-kpi-val {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 21px;
  font-weight: 800;
}
.detail-mini-row {
  display: flex;
  gap: 10px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.detail-mini {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 8px 12px;
  min-width: 120px;
}
.detail-mini-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 4px;
}
.detail-mini-val {
  font-size: 13px;
  font-weight: 700;
  color: var(--accent2);
}

/* quick-edit chips on the project detail page (Stage / S-T / Priority / Programme) */
.quickedit-row {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.quickedit-field {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 8px 12px;
  min-width: 130px;
}
.quickedit-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .06em;
  margin-bottom: 4px;
}

/* ================================================================
   ACTION LOG
================================================================ */
.actionlog-wrap { margin-top: 14px; }
.actionlog-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px;
  font-weight: 700;
  color: var(--brand);
  letter-spacing: .08em;
  text-transform: uppercase;
  margin-bottom: 6px;
  border-left: 3px solid var(--accent);
  padding-left: 8px;
}
.actionlog-add {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
  align-items: flex-start;
}
.actionlog-add textarea {
  flex: 1;
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 8px 10px;
  font-size: 13px;
  font-family: 'Barlow', sans-serif;
  resize: vertical;
  min-height: 60px;
  outline: none;
  background: var(--panel);
}
.actionlog-add textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(38,169,216,0.2); }
.actionlog-feed {
  display: flex;
  flex-direction: column;
  gap: 10px;
  max-height: 480px;
  overflow-y: auto;
}
.actionlog-entry {
  background: var(--panel);
  border: 1px solid var(--line);
  border-left: 3px solid var(--accent2);
  border-radius: 6px;
  padding: 10px 12px;
}
.actionlog-entry:first-child { border-left-color: var(--ok); }
.actionlog-meta {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .04em;
  margin-bottom: 4px;
}
.actionlog-body {
  font-size: 12px;
  color: var(--ink);
  white-space: pre-wrap;
  line-height: 1.5;
}
.actionlog-empty {
  font-size: 12px;
  color: var(--muted);
  padding: 12px;
  text-align: center;
}

/* ================================================================
   BUTTON
================================================================ */
.btn {
  background: var(--accent);
  color: var(--brand);
  border: none;
  border-radius: 6px;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 12px;
  padding: 8px 18px;
  letter-spacing: .06em;
  text-transform: uppercase;
  transition: background 0.15s, color 0.15s;
  cursor: pointer;
}
.btn:hover { background: var(--accent2); color: #fff; }
.btn-sm {
  padding: 5px 12px;
  font-size: 11px;
}
.btn-ghost {
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.35);
  color: #fff;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px;
  font-weight: 800;
  letter-spacing: .05em;
  text-transform: uppercase;
  padding: 6px 16px;
  border-radius: 6px;
  transition: background 0.15s;
  cursor: pointer;
}
.btn-ghost:hover { background: rgba(255,255,255,0.24); }

/* ================================================================
   FORM
================================================================ */
.form-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 20px;
  margin-top: 12px;
}
.form-field label {
  display: block;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  color: var(--brand);
  font-weight: 700;
  margin-bottom: 5px;
  text-transform: uppercase;
  letter-spacing: .05em;
}
.form-field input, .form-field select, .form-field textarea {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 6px 9px;
  font-size: 13px;
  background: var(--panel);
  color: var(--ink);
  outline: none;
  transition: border-color 0.12s;
}
.form-field input:focus, .form-field select:focus, .form-field textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(38,169,216,0.2);
}
.form-field textarea { resize: vertical; min-height: 80px; }
.form-field-full { grid-column: 1 / -1; }
.form-actions { margin-top: 16px; display: flex; gap: 10px; }

/* ================================================================
   LOADING / ERROR
================================================================ */
.loading {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Barlow Condensed', sans-serif;
  color: var(--muted);
  gap: 12px;
}
.loading-spinner {
  width: 32px;
  height: 32px;
  border: 3px solid var(--line);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ================================================================
   TOAST
================================================================ */
.toast {
  position: fixed;
  top: 20px; right: 20px;
  padding: 11px 20px;
  border-radius: 6px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: .03em;
  z-index: 9999;
  animation: toastIn 0.2s ease;
  max-width: 380px;
}
.toast.ok  { background: var(--ok);  color: #fff; }
.toast.err { background: var(--red); color: #fff; }
@keyframes toastIn { from { opacity:0; transform:translateX(16px); } to { opacity:1; transform:translateX(0); } }

/* ================================================================
   INLINE EDIT ROW INPUT
================================================================ */
.row-inp {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 3px 6px;
  font-size: 12px;
  background: var(--panel);
  color: var(--ink);
  outline: none;
}
.row-inp:focus { border-color: var(--accent); }
</style>
</head>
<body>
<div id="app">
  <div class="loading" id="login-screen">
    <div style="text-align:center;font-family:'Barlow Condensed',sans-serif;">
      <div style="font-size:22px;font-weight:bold;color:var(--navy);margin-bottom:8px;">ControlCentre — NuCCoL</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:32px;">Sign in with your NuCCoL Microsoft account</div>
      <button id="login-btn" style="background:var(--blue);color:#fff;border:2px solid var(--navy);font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:bold;padding:12px 32px;cursor:pointer;letter-spacing:0.5px;">
        Sign in with Microsoft
      </button>
      <div id="login-error" style="color:var(--red);font-size:12px;margin-top:16px;display:none;"></div>
    </div>
  </div>
</div>

<script>
/* ================================================================
   CONFIGURATION
================================================================ */
const CFG = {
  tenantId : 'd44192f5-1023-458c-9cb3-9ff7e9c6d4ad',
  clientId : 'ec0a6806-59e8-4ea9-8ff5-6bdb1ba87baf',
  siteUrl  : 'https://nuccol.sharepoint.com/sites/ProjectControl',
  scope    : 'https://nuccol.sharepoint.com/.default',
  lists: {
    projects    : 'Projects',
    timeEntries : 'TimeEntries',
    expenses    : 'Expenses',
    employees   : 'Employees'
  },
  // Single-list lifecycle — matches the Pipeline Extract spreadsheet's own
  // stage vocabulary exactly (see SCHEMA_SPEC.md). Projects now carries the
  // full journey from first contact through delivery; there is no separate
  // pipeline list any more.
  stageChoices    : ['Engagement','Build','Proposal','Deliver','Complete','Lost/Declined'],
  categoryChoices : ['SC Development','SC Analysis','Skills / People','Events','IT','Cyber / IT'],
  stChoices       : ['S','T'],
  priorityChoices : ['1','2','3'],
  owners: ['Stephen Kinsey','Steven Farey','John Hilton-Brammer','Rene Dorset','Liz Gregory']
};

/* ================================================================
   MSAL
================================================================ */
const msalApp = new msal.PublicClientApplication({
  auth: {
    clientId  : CFG.clientId,
    authority : `https://login.microsoftonline.com/${CFG.tenantId}`,
    redirectUri: window.location.origin + window.location.pathname.replace(/[^/]*$/, 'auth-redirect.html')
  },
  cache: { cacheLocation: 'sessionStorage', storeAuthStateInCookie: false }
});

// Popup-based auth (not redirect): redirect flows are blocked by MSAL when the
// app is running inside an iframe (e.g. embedded in the SCC hub), since a
// redirect happening in a hidden frame is a clickjacking vector. Popups work
// fine from an iframe and behave identically when run standalone.
async function getToken() {
  const accounts = msalApp.getAllAccounts();
  if (!accounts.length) {
    const result = await msalApp.loginPopup({ scopes: [CFG.scope] });
    msalApp.setActiveAccount(result.account);
    return result.accessToken;
  }
  msalApp.setActiveAccount(accounts[0]);
  try {
    const r = await msalApp.acquireTokenSilent({ scopes: [CFG.scope], account: accounts[0] });
    return r.accessToken;
  } catch {
    const r = await msalApp.acquireTokenPopup({ scopes: [CFG.scope] });
    return r.accessToken;
  }
}

/* ================================================================
   SHAREPOINT REST
================================================================ */
async function spGet(path) {
  const token = await getToken();
  const res = await fetch(`${CFG.siteUrl}/_api/${path}`, {
    headers: { Authorization: `Bearer ${token}`, Accept: 'application/json;odata=nometadata' }
  });
  if (!res.ok) throw new Error(`GET ${res.status}: ${path}`);
  return res.json();
}

async function spPost(path, body) {
  const token = await getToken();
  const res = await fetch(`${CFG.siteUrl}/_api/${path}`, {
    method: 'POST',
    headers: {
      Authorization: `Bearer ${token}`,
      Accept: 'application/json;odata=nometadata',
      'Content-Type': 'application/json;odata=nometadata'
    },
    body: JSON.stringify(body)
  });
  if (!res.ok) { const t = await res.text(); throw new Error(`POST ${res.status}: ${t}`); }
  const t = await res.text();
  return t ? JSON.parse(t) : {};
}

async function spPatch(path, body) {
  const token = await getToken();
  const res = await fetch(`${CFG.siteUrl}/_api/${path}`, {
    method: 'POST',
    headers: {
      Authorization: `Bearer ${token}`,
      Accept: 'application/json;odata=nometadata',
      'Content-Type': 'application/json;odata=nometadata',
      'X-HTTP-Method': 'MERGE',
      'If-Match': '*'
    },
    body: JSON.stringify(body)
  });
  if (!res.ok) { const t = await res.text(); throw new Error(`PATCH ${res.status}: ${t}`); }
}

async function spDelete(path) {
  const token = await getToken();
  const res = await fetch(`${CFG.siteUrl}/_api/${path}`, {
    method: 'POST',
    headers: {
      Authorization: `Bearer ${token}`,
      Accept: 'application/json;odata=nometadata',
      'Content-Type': 'application/json;odata=nometadata',
      'X-HTTP-Method': 'DELETE',
      'If-Match': '*'
    }
  });
  if (!res.ok) { const t = await res.text(); throw new Error(`DELETE ${res.status}: ${t}`); }
}

const listItems = n => `web/lists/getbytitle('${encodeURIComponent(n)}')/items`;
const listItem  = (n,id) => `web/lists/getbytitle('${encodeURIComponent(n)}')/items(${id})`;

// Fetch a list with specific fields; if 400 (field doesn't exist / not yet
// propagated), retry without $select so the app still loads.
async function spGetWithFallback(listName, fields, top=500, orderBy='Title') {
  const base = listItems(listName);
  try {
    return await spGet(`${base}?$select=${fields}&$top=${top}&$orderby=${orderBy} asc`);
  } catch(e) {
    if (e.message.startsWith('GET 400')) {
      try {
        return await spGet(`${base}?$top=${top}&$orderby=Title asc`);
      } catch(e2) {
        return await spGet(`${base}?$top=${top}`);
      }
    }
    throw e;
  }
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function money(v) {
  const n = Number(v) || 0;
  return '£' + n.toLocaleString('en-GB', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}
function moneyDec(v) {
  const n = Number(v) || 0;
  return '£' + n.toLocaleString('en-GB', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function num(v) { return Number(v || 0).toLocaleString('en-GB', { maximumFractionDigits: 1 }); }
function pct(v) { return (Number(v) || 0).toFixed(1) + '%'; }
function ukDate(s) {
  if (!s) return '—';
  const d = new Date(s.split('T')[0] + 'T12:00:00');
  return d.toLocaleDateString('en-GB');
}
function stageClass(s) {
  const m = {
    'Engagement':'stage-engagement', 'Build':'stage-build', 'Proposal':'stage-proposal',
    'Deliver':'stage-deliver', 'Complete':'stage-complete', 'Lost/Declined':'stage-lost'
  };
  return m[s] || 'stage-engagement';
}
function priClass(p) { return p ? `pri-${p}` : ''; }
function render(html) { document.getElementById('app').innerHTML = html; }
function toast(msg, type='ok') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

/* ================================================================
   ACTION LOG — append-only feed
   Entries are stored as one plain-text field (ActionLogEntries), newest
   first, each block formatted "[DD/MM/YYYY HH:MM — Owner]\nbody\n" and
   separated from the next by a blank line. New entries are prepended,
   never overwritten — matches the spreadsheet's own Action Log column
   and the format the migration script wrote historic entries in.
================================================================ */
function initialsOf(name) {
  if (!name) return '';
  return name.trim().split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0,3);
}
function nowUK() {
  const d = new Date();
  const pad = n => String(n).padStart(2,'0');
  return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function buildActionLogEntry(text, owner) {
  const tag = owner ? ` — ${owner}` : '';
  return `[${nowUK()}${tag}]\n${text}\n`;
}
function prependActionLog(existing, text, owner) {
  const entry = buildActionLogEntry(text, owner);
  return existing ? `${entry}\n${existing}` : entry;
}
// Parses the stored text back into individual entries for the feed view.
// Blocks are separated by a blank line; each block's first line is the
// "[date — owner]" header if present.
function parseActionLog(raw) {
  if (!raw || !raw.trim()) return [];
  const blocks = raw.split(/\n\s*\n/).map(b => b.trim()).filter(Boolean);
  return blocks.map(b => {
    const lines = b.split('\n');
    const headerMatch = lines[0].match(/^\[(.+?)\]$/);
    if (headerMatch) {
      return { header: headerMatch[1], body: lines.slice(1).join('\n').trim() };
    }
    return { header: '', body: b };
  });
}
function renderActionLogFeed(raw) {
  const entries = parseActionLog(raw);
  if (!entries.length) return `<div class="actionlog-empty">No entries yet — add the first update below.</div>`;
  return `<div class="actionlog-feed">${entries.map(e => `
    <div class="actionlog-entry">
      ${e.header ? `<div class="actionlog-meta">${esc(e.header)}</div>` : ''}
      <div class="actionlog-body">${esc(e.body)}</div>
    </div>`).join('')}</div>`;
}

   Each project gets a real, bookmarkable URL: ControlCentre.html#project-123
   so it can eventually be deep-linked to from the CRM (scc.html).
================================================================ */
function setProjectHash(id) {
  history.replaceState(null, '', `#project-${id}`);
}
function clearHash() {
  history.replaceState(null, '', window.location.pathname + window.location.search);
}
function getProjectIdFromHash() {
  const m = window.location.hash.match(/^#project-(\d+)$/);
  return m ? parseInt(m[1], 10) : null;
}

async function loadAll() {
  render('<div class="loading"><div class="loading-spinner"></div>Loading data…</div>');

  // Load user
  const u = await spGet('web/currentuser');
  S.currentUser = { email: u.Email, displayName: u.Title };

  // Projects — single unified list. Explicit field list with a graceful
  // fallback (spGetWithFallback) in case a field name doesn't resolve.
  const proj = await spGetWithFallback(
    CFG.lists.projects,
    'ID,Title,Company,ProjectTitle0,ProjectNumber,POValue,PlannedHours,StartDate,EndDate,' +
    'Stage,StrategicTactical,Priority,Programme,Probability,Category,Contact,ActionLogEntries,TotalCommercialCost',
    2000
  );

  // Try TimeEntries with expand; if 400 (lookup column name wrong), fall back to no expand
  let teRaw;
  try {
    teRaw = await spGet(`${listItems(CFG.lists.timeEntries)}?$expand=Project&$top=5000&$orderby=Date desc`);
    S._teHasExpand = true;
  } catch(e1) {
    try {
      teRaw = await spGet(`${listItems(CFG.lists.timeEntries)}?$expand=ProjectLookup&$top=5000&$orderby=Date desc`);
      S._teHasExpand = true;
    } catch(e2) {
      // Fall back: no expand at all — we'll match via *Id integer fields
      teRaw = await spGet(`${listItems(CFG.lists.timeEntries)}?$top=5000&$orderby=Date desc`);
      S._teHasExpand = false;
    }
  }

  // Try Expenses with expand; fall back to no expand
  let expRaw;
  try {
    expRaw = await spGet(`${listItems(CFG.lists.expenses)}?$expand=EmployeeName&$top=2000&$orderby=Date desc`);
  } catch(e) {
    expRaw = await spGet(`${listItems(CFG.lists.expenses)}?$top=2000&$orderby=Date desc`);
  }

  const te = teRaw;
  const exp = expRaw;

  // Field names confirmed from list schema — ProjectTitle internal name is
  // ProjectTitle0, Company is Company.
  S.projects = proj.value.map(p => ({
    ...p,
    ProjectTitle:  p.ProjectTitle0 || p.Title || '',
    DisplayName:   p.Company ? (p.ProjectTitle0 ? `${p.Company}-${p.ProjectTitle0}` : p.Company) : (p.ProjectTitle0 || p.Title || ''),
    POValue:       Number(p.POValue ?? 0),
    PlannedHours:  Number(p.PlannedHours ?? 0),
    Stage:         p.Stage || 'Engagement'
  }));

  // Detect TimeEntries lookup field names from returned data
  const sampleTE = te.value[0] || {};
  let teProjField;
  if (S._teHasExpand) {
    teProjField = Object.keys(sampleTE).find(k => !k.endsWith('Id') && sampleTE[k] && typeof sampleTE[k] === 'object' && 'Id' in sampleTE[k] && k.toLowerCase().includes('project')) || 'Project';
  } else {
    teProjField = null;
    S._teProjIdField = Object.keys(sampleTE).find(k => /^project.*id$/i.test(k)) || 'ProjectId';
  }
  S._teProjField = teProjField;

  S.timeEntries = te.value;
  S.expenses = exp.value;
}

/* ================================================================
   COMPUTED HELPERS
================================================================ */
function teForProject(projId) {
  if (S._teHasExpand && S._teProjField) {
    const f = S._teProjField;
    return S.timeEntries.filter(t => t[f] && t[f].Id === projId);
  }
  const f = S._teProjIdField || 'ProjectId';
  return S.timeEntries.filter(t => t[f] === projId);
}
function expForProject(displayName) {
  return S.expenses.filter(e => e.Project === displayName);
}
function expForEmployee(displayName, empName) {
  return S.expenses.filter(e => e.Project === displayName && e.EmployeeName && e.EmployeeName.DisplayName === empName);
}
function sumHours(entries) { return entries.reduce((a,e) => a + (e.HoursWorked||0) + (e.TravelHours||0), 0); }
// Use stored cost if available; fall back to rate * hours / 7 (PA flow may not have run yet)
function entryStaffCost(e) {
  const stored = Number(e.StaffCost);
  if (stored && stored !== 0) return stored;
  return ((e.HoursWorked||0) + (e.TravelHours||0)) * Number(e.StaffRate||0) / 7;
}
function entryCommercialCost(e) {
  const stored = Number(e.CommercialCost);
  if (stored && stored !== 0) return stored;
  return ((e.HoursWorked||0) + (e.TravelHours||0)) * Number(e.CommercialRate||0) / 7;
}
function sumStaff(entries) { return entries.reduce((a,e) => a + entryStaffCost(e), 0); }
function sumCommercial(entries) { return entries.reduce((a,e) => a + entryCommercialCost(e), 0); }
function sumExpenses(exps) { return exps.reduce((a,e) => a + (e.Amount||0), 0); }

function groupByEmployee(entries) {
  const map = {};
  for (const e of entries) {
    const n = e.EmployeeName || 'Unknown';
    if (!map[n]) map[n] = [];
    map[n].push(e);
  }
  return Object.entries(map).map(([name, rows]) => ({
    name,
    hours: rows.reduce((a,r) => a + (r.HoursWorked||0), 0),
    travel: rows.reduce((a,r) => a + (r.TravelHours||0), 0),
    staffCost: rows.reduce((a,r) => a + entryStaffCost(r), 0),
    commercialCost: rows.reduce((a,r) => a + entryCommercialCost(r), 0)
  })).sort((a,b) => a.name.localeCompare(b.name));
}

function filteredProjects() {
  const f = S.projectFilter;
  const q = (S.searchQuery || '').trim().toLowerCase();
  return S.projects.filter(p => {
    if (f) {
      if (f === 'InBudget') { if (sumCommercial(teForProject(p.ID)) > (p.POValue||0)) return false; }
      else if (f === 'OverBudget') { if (sumCommercial(teForProject(p.ID)) <= (p.POValue||0)) return false; }
      else if (p.Stage !== f) return false;
    }
    if (S.filterCategory && p.Category !== S.filterCategory) return false;
    if (S.filterProgramme && p.Programme !== S.filterProgramme) return false;
    if (S.filterST && p.StrategicTactical !== S.filterST) return false;
    if (S.filterPriority && p.Priority !== S.filterPriority) return false;
    if (q) {
      const hay = [p.DisplayName, p.Company, p.ProjectTitle, p.ProjectNumber, p.Contact]
        .filter(Boolean).join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

// Unique values already in use per field, for the filter dropdowns.
function categoryOptionsInUse() {
  const set = new Set();
  S.projects.forEach(p => { if (p.Category) set.add(p.Category); });
  return Array.from(set).sort();
}

// Unique Programme values already in use, so the Add/Edit forms can
// autocomplete via <datalist> while still allowing free text (Programme is
// a fill-in-choice field in SharePoint — F4N today, more added over time).
function programmeOptions() {
  const set = new Set(['F4N']);
  S.projects.forEach(p => { if (p.Programme) set.add(p.Programme); });
  return Array.from(set).sort();
}

async function updateProjectField(projId, field, value) {
  try {
    await spPatch(listItem(CFG.lists.projects, projId), { [field]: value });
    const p = S.projects.find(x => x.ID === projId);
    if (p) p[field] = value;
    if (S.selectedProject && S.selectedProject.ID === projId) S.selectedProject[field] = value;
    toast(`${field} updated`);
  } catch(e) {
    toast('Update failed: ' + e.message, 'err');
  }
}

    return `<tr class="clickable">
      <td onclick="viewProjectDetail(${p.ID})">${esc(p.DisplayName)}</td>
      <td onclick="event.stopPropagation()">
        <select class="inline-select" onchange="updateProjectField(${p.ID},'Stage',this.value)">

      </td>
      <td onclick="event.stopPropagation()">
        <select class="inline-select" onchange="updateProjectField(${p.ID},'StrategicTactical',this.value)">
          <option value="" ${!p.StrategicTactical?'selected':''}>—</option>
          ${statusOpts(CFG.stChoices, p.StrategicTactical)}
        </select>
      </td>
      <td onclick="event.stopPropagation()">
        <select class="inline-select" onchange="updateProjectField(${p.ID},'Priority',this.value)">
          <option value="" ${!p.Priority?'selected':''}>—</option>
          ${statusOpts(CFG.priorityChoices, p.Priority)}
        </select>

  if (box && S._searchHadFocus) {
    box.focus();
    const pos = S._searchCursorPos ?? box.value.length;
    box.setSelectionRange(pos, pos);

/* ================================================================
   PROJECT DETAIL SCREEN
================================================================ */
function viewProjectDetail(projId) {
  const p = S.projects.find(x => x.ID === projId);
  if (!p) { viewProjectOverview(); return; }
  S.selectedProject = p;
  S.view = 'projectDetail';
  setProjectHash(projId);
  _renderProjectDetail();
}

function _renderProjectDetail() {
  const p = S.selectedProject;
  const te = teForProject(p.ID);
  const exps = expForProject(p.DisplayName);
  const hoursBooked = sumHours(te);
  const staffCost = sumStaff(te);
  const commercial = sumCommercial(te);
  const totalExp = sumExpenses(exps);
  const hoursLeft = (p.PlannedHours||0) - hoursBooked;
  const budgetLeft = (p.POValue||0) - commercial - totalExp;
  const budgetPct = p.POValue ? (budgetLeft / p.POValue * 100) : 0;
  const empRows = groupByEmployee(te);

  const empTableRows = empRows.map(e => {
    const empExps = sumExpenses(expForEmployee(p.DisplayName, e.name));
    return `<tr class="clickable" onclick="viewEmployeeEntries(${p.ID},'${esc(p.ProjectTitle)}','${esc(p.DisplayName)}','${esc(e.name)}')">
      <td>${esc(e.name)}</td>
      <td class="ta-center">${num(e.hours)}</td>
      <td class="ta-center">${num(e.travel)}</td>
      <td class="ta-right">${moneyDec(empExps)}</td>
      <td class="ta-right">${money(e.staffCost)}</td>
      <td class="ta-right">${money(e.commercialCost)}</td>
    </tr>`;
  }).join('');

  render(`
    <div class="hdr">
      <div class="hdr-left">
        <button class="back-btn" onclick="viewProjectOverview()">← Back</button>
        <div>
          <div class="hdr-title" style="font-size:18px;">${esc(p.DisplayName)} — Project Summary</div>
          <div class="hdr-sub"><span class="${stageClass(p.Stage)}">${esc(p.Stage)}</span></div>
        </div>
      </div>
      <div class="hdr-right" style="gap:10px;">
        <div style="background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.25);padding:6px 12px;font-family:'Barlow Condensed',sans-serif;font-size:11px;color:#BFDBFE;">
          <div style="font-size:10px;opacity:0.7;margin-bottom:2px;">START</div>
          <div>${ukDate(p.StartDate)}</div>
        </div>
        <div style="background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.25);padding:6px 12px;font-family:'Barlow Condensed',sans-serif;font-size:11px;color:#BFDBFE;">
          <div style="font-size:10px;opacity:0.7;margin-bottom:2px;">END</div>
          <div>${ukDate(p.EndDate)}</div>
        </div>
        <div style="background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.25);padding:6px 12px;font-family:'Barlow Condensed',sans-serif;font-size:11px;color:#BFDBFE;">
          <div style="font-size:10px;opacity:0.7;margin-bottom:2px;">PO VALUE</div>
          <div>${money(p.POValue)}</div>
        </div>
        <button class="btn-ghost" onclick="viewEditProject(${p.ID})">✏️ Edit Project</button>
        <span class="user-chip">${esc(S.currentUser?.displayName||'')}</span>

async function addActionLogEntry(projId) {
  const ta = document.getElementById('newLogEntry');
  const text = ta?.value?.trim();
  if (!text) { toast('Enter some text first', 'err'); return; }
  try {
    const p = S.projects.find(x => x.ID === projId);
    const owner = initialsOf(S.currentUser?.displayName);
    const updated = prependActionLog(p.ActionLogEntries || '', text, owner);
    await spPatch(listItem(CFG.lists.projects, projId), { ActionLogEntries: updated });
    p.ActionLogEntries = updated;
    if (S.selectedProject && S.selectedProject.ID === projId) S.selectedProject.ActionLogEntries = updated;
    toast('Entry added');
    _renderProjectDetail();
  } catch(e) { toast('Save failed: ' + e.message, 'err'); }
}

function viewEmployeeEntries(projId, projTitle, projDisplayName, empName) {
  S.drillProjectId = projId;
  S.drillProjectTitle = projTitle;
  S.drillProjectDisplayName = projDisplayName;
  S.selectedEmployee = empName;
  S.view = 'employeeEntries';
  _renderEmployeeEntries();
}

function _renderEmployeeEntries() {
  const empName = S.selectedEmployee;
  const _pf = S._teHasExpand && S._teProjField ? S._teProjField : null;
  const _pfId = S._teProjIdField || 'ProjectId';

  const entries = S.timeEntries.filter(t =>
    (_pf ? (t[_pf] && t[_pf].Id === S.drillProjectId) : t[_pfId] === S.drillProjectId)
    && t.EmployeeName === empName
  );
  const exps = S.expenses.filter(e =>
    e.Project === S.drillProjectDisplayName && e.EmployeeName?.DisplayName === empName
  );

  const th = entries.reduce((a,e)=>a+(e.HoursWorked||0),0);
  const tt = entries.reduce((a,e)=>a+(e.TravelHours||0),0);
  const ts = sumStaff(entries);
  const tc = sumCommercial(entries);
  const te = sumExpenses(exps);

  const teRows = entries.length ? entries.map(e => `
    <tr>
      <td class="nowrap">${ukDate(e.Date)}</td>
      <td>${esc((e[_pf] && (e[_pf].Title)) || S.drillProjectDisplayName || '')}</td>
      <td class="ta-center">${num(e.HoursWorked)}</td>
      <td class="ta-center">${num(e.TravelHours)}</td>
      <td class="ta-right">${money(e.StaffCost)}</td>
      <td class="ta-right">${money(e.CommercialCost)}</td>
      <td>${esc(e.Notes||'')}</td>
    </tr>`).join('')
    : `<tr><td colspan="7" class="ta-center" style="padding:14px;color:var(--muted);">No time entries</td></tr>`;

  const expRows = exps.length ? exps.map(e => `
    <tr>
      <td class="nowrap">${ukDate(e.Date)}</td>
      <td>${esc(e.Project||'')}</td>
      <td class="ta-center">${esc(e.Category||'')}</td>
      <td class="ta-right">${moneyDec(e.Amount)}</td>
      <td>${esc(e.Notes||'')}</td>
    </tr>`).join('')
    : `<tr><td colspan="5" class="ta-center" style="padding:14px;color:var(--muted);">No expenses</td></tr>`;

  render(`
    <div class="hdr">
      <div class="hdr-left">
        <button class="back-btn" onclick="viewProjectDetail(${S.drillProjectId})">← Back</button>
        <div>
          <div class="hdr-title" style="font-size:18px;">${esc(empName)} — TimeSink</div>
          <div class="hdr-sub">${esc(S.drillProjectDisplayName)}</div>
        </div>
      </div>
    </div>
    <div class="main">
      <div class="kpi-row">
        ${kpi('Total Hours', num(th), 'var(--blue)')}
        ${kpi('Travel Hours', num(tt), 'var(--orange)')}
        ${kpi('Expenses', moneyDec(te), 'var(--green)')}
        ${kpi('Staff Cost', money(ts), 'var(--violet)')}
        ${kpi('Charge Rate', money(tc), 'var(--indigo)')}
      </div>

      <div class="section-hd">Time Entries</div>
      <table class="data-table">
        <thead><tr>
          <th style="width:100px;">Date</th>
          <th>Project</th>
          <th class="ta-center" style="width:80px;">Hours</th>
          <th class="ta-center" style="width:80px;">Travel</th>
          <th class="ta-right" style="width:110px;">Staff Rate</th>
          <th class="ta-right" style="width:120px;">Charge Rate</th>
          <th>Notes</th>
        </tr></thead>
        <tbody>${teRows}</tbody>
        ${entries.length ? `<tfoot><tr>
          <td colspan="2">TOTAL</td>
          <td class="ta-center">${num(th)}</td>
          <td class="ta-center">${num(tt)}</td>
          <td class="ta-right">${money(ts)}</td>
          <td class="ta-right">${money(tc)}</td>
          <td></td>
        </tr></tfoot>` : ''}
      </table>

      <div class="section-hd" style="margin-top:24px;">Expenses</div>
      <table class="data-table">
        <thead><tr>
          <th style="width:100px;">Date</th>
          <th>Project</th>
          <th class="ta-center" style="width:150px;">Category</th>
          <th class="ta-right" style="width:110px;">Amount</th>
          <th>Notes</th>
        </tr></thead>
        <tbody>${expRows}</tbody>
        ${exps.length ? `<tfoot><tr>
          <td colspan="3">TOTAL</td>
          <td class="ta-right">${moneyDec(te)}</td>
          <td></td>
        </tr></tfoot>` : ''}
      </table>
    </div>
  `);
}

function kpi(label, val, color) {
  return `<div class="kpi-card-static">
    <div class="kpi-label">${label}</div>
    <div class="kpi-val" style="color:${color}">${val}</div>
  </div>`;
}

async function submitNewProject() {
  const company = document.getElementById('f_company')?.value?.trim();
  if (!company) { toast('Company is required', 'err'); return; }
  const projectTitle = document.getElementById('f_projectTitle')?.value?.trim() || '';
  const logText = document.getElementById('f_logentry')?.value?.trim();

  const body = {
    Company:            company,
    ProjectTitle0:      projectTitle,
    ProjectNumber:      document.getElementById('f_projectNumber')?.value?.trim() || null,
    Stage:              document.getElementById('f_stage')?.value || 'Engagement',
    Category:           document.getElementById('f_category')?.value || null,
    StrategicTactical:  document.getElementById('f_st')?.value || null,
    Priority:           document.getElementById('f_priority')?.value || null,
    Programme:          document.getElementById('f_programme')?.value?.trim() || null,
    POValue:            parseFloat(document.getElementById('f_value')?.value) || null,
    PlannedHours:       parseFloat(document.getElementById('f_plannedHours')?.value) || null,
    StartDate:          document.getElementById('f_startDate')?.value || null,
    EndDate:            document.getElementById('f_endDate')?.value || null,
    Contact:            document.getElementById('f_contact')?.value?.trim() || null,
    ActionLogEntries:   logText ? prependActionLog('', logText, initialsOf(S.currentUser?.displayName)) : null
  };

  try {
    const created = await spPost(listItems(CFG.lists.projects), body);
    S.projects.push({
      ...body,
      ID: created.ID || created.Id,
      ProjectTitle: projectTitle,
      DisplayName: projectTitle ? `${company}-${projectTitle}` : company,
      POValue: body.POValue || 0,
      PlannedHours: body.PlannedHours || 0
    });
    toast('Project added successfully!');
    viewProjectOverview();
  } catch(e) { toast('Error saving project: ' + e.message, 'err'); }
}

          <input type="text" id="ep_company" value="${esc(p.Company||'')}">
        </div>
        <div class="form-field">
          <label>Project Title / Contract</label>
          <input type="text" id="ep_projectTitle" value="${esc(p.ProjectTitle||'')}">
        </div>
        <div class="form-field">
          <label>Project Number</label>
          <input type="text" id="ep_projectNumber" value="${esc(p.ProjectNumber||'')}">
        </div>
        <div class="form-field">
          <label>Stage</label>
          <select id="ep_stage">
            ${statusOpts(CFG.stageChoices, p.Stage)}
          </select>
        </div>
        <div class="form-field">
          <label>Category</label>
          <select id="ep_category">
            <option value="">— Select category —</option>
            ${statusOpts(CFG.categoryChoices, p.Category)}
          </select>
        </div>
        <div class="form-field">
          <label>Strategic / Tactical</label>
          <select id="ep_st">
            <option value="">—</option>
            ${statusOpts(CFG.stChoices, p.StrategicTactical)}
          </select>
        </div>
        <div class="form-field">
          <label>Priority</label>
          <select id="ep_priority">
            <option value="">—</option>
            ${statusOpts(CFG.priorityChoices, p.Priority)}
          </select>
        </div>
        <div class="form-field">
          <label>Programme</label>
          <input type="text" id="ep_programme" list="programmeList" value="${esc(p.Programme||'')}">
          <datalist id="programmeList">
            ${programmeOptions().map(o => `<option value="${esc(o)}">`).join('')}
          </datalist>
        </div>
        <div class="form-field">
          <label>PO Value (£)</label>
          <input type="number" id="ep_poValue" value="${p.POValue||''}">
        </div>
        <div class="form-field">
          <label>Planned Hours</label>
          <input type="number" id="ep_plannedHours" value="${p.PlannedHours||''}">
        </div>
        <div class="form-field">
          <label>Start Date</label>
          <input type="date" id="ep_startDate" value="${(p.StartDate||'').slice(0,10)}">
        </div>
        <div class="form-field">
          <label>End Date</label>
          <input type="date" id="ep_endDate" value="${(p.EndDate||'').slice(0,10)}">
        </div>
        <div class="form-field">
          <label>Contact</label>
          <input type="text" id="ep_contact" value="${esc(p.Contact||'')}">
        </div>
      </div>
      <div class="form-actions">
        <button class="btn" onclick="saveEditProject(${projId})">💾 Save Changes</button>
        <button class="btn" style="background:var(--muted);border-color:var(--muted);" onclick="viewProjectDetail(${projId})">Cancel</button>
      </div>
    </div>
  `);
}

async function saveEditProject(projId) {
  const company = document.getElementById('ep_company')?.value?.trim();
  if (!company) { toast('Company is required', 'err'); return; }
  const projectTitle = document.getElementById('ep_projectTitle')?.value?.trim() || '';
  const body = {
    Company:            company,
    ProjectTitle0:      projectTitle,
    ProjectNumber:      document.getElementById('ep_projectNumber')?.value?.trim() || null,
    Stage:              document.getElementById('ep_stage')?.value || 'Engagement',
    Category:           document.getElementById('ep_category')?.value || null,
    StrategicTactical:  document.getElementById('ep_st')?.value || null,
    Priority:           document.getElementById('ep_priority')?.value || null,
    Programme:          document.getElementById('ep_programme')?.value?.trim() || null,
    POValue:            parseFloat(document.getElementById('ep_poValue')?.value) || null,
    PlannedHours:       parseFloat(document.getElementById('ep_plannedHours')?.value) || null,
    StartDate:          document.getElementById('ep_startDate')?.value || null,
    EndDate:            document.getElementById('ep_endDate')?.value || null,
    Contact:            document.getElementById('ep_contact')?.value?.trim() || null,
  };
  try {
    await spPatch(listItem(CFG.lists.projects, projId), body);
    const p = S.projects.find(x => x.ID === projId);
    if (p) {
      Object.assign(p, {
        Company: company, ProjectTitle: projectTitle,
        DisplayName: projectTitle ? `${company}-${projectTitle}` : company,
        ProjectNumber: body.ProjectNumber, Stage: body.Stage, Category: body.Category,
        StrategicTactical: body.StrategicTactical, Priority: body.Priority, Programme: body.Programme,
        POValue: body.POValue||0, PlannedHours: body.PlannedHours||0,
        StartDate: body.StartDate, EndDate: body.EndDate, Contact: body.Contact
      });
      S.selectedProject = p;
    }
    toast('Project updated');
    viewProjectDetail(projId);
  } catch(e) { toast('Save failed: ' + e.message, 'err'); }
}

/* ================================================================
   INIT
================================================================ */
async function init() {
  try {
    await msalApp.initialize();
    const redirectResult = await msalApp.handleRedirectPromise();
    if (redirectResult) msalApp.setActiveAccount(redirectResult.account);

    const accounts = msalApp.getAllAccounts();
    if (!accounts.length) {
      const btn = document.getElementById('login-btn');
      if (btn) {
        btn.addEventListener('click', async () => {
          btn.disabled = true;
          btn.textContent = 'Signing in…';
          try {
            const result = await msalApp.loginPopup({ scopes: [CFG.scope] });
            msalApp.setActiveAccount(result.account);
            await loadAll();
            openInitialView();
          } catch(err) {
            btn.disabled = false;
            btn.textContent = 'Sign in with Microsoft';
            const errDiv = document.getElementById('login-error');
            if (errDiv) { errDiv.textContent = err.message; errDiv.style.display = 'block'; }
          }
        });
      }
      return;
    }
    msalApp.setActiveAccount(accounts[0]);
    await loadAll();
    openInitialView();
  } catch(e) {
    render(`
      <div class="loading">
        <div style="color:var(--red);font-family:'Barlow Condensed',sans-serif;font-size:14px;text-align:center;max-width:500px;">
          <strong>Error:</strong> ${esc(e.message)}<br><br>
          Check that tenantId, clientId, and siteUrl are configured correctly.
          <br><br>
          <button onclick="init()" style="font-family:'Barlow Condensed',sans-serif;padding:8px 18px;cursor:pointer;background:var(--blue);color:#fff;border:2px solid var(--navy);font-weight:bold;">
            Retry
          </button>
        </div>
      </div>`);
  }
}

// Deep-link support: ControlCentre.html#project-123 opens straight into
// that project's detail page (once signed in). Falls back to Home if the
// hash is missing, malformed, or the project can't be found.
function openInitialView() {
  const hashId = getProjectIdFromHash();
  if (hashId && S.projects.some(p => p.ID === hashId)) {
    viewProjectDetail(hashId);
  } else {
    viewHome();
  }
}

init();
</script>
